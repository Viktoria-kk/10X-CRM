<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10X CRM - Sign Up</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/auth.js" defer></script>
</head>
<body>
  <main class="auth-page">
    <div class="container">
      <section class="auth-card" aria-labelledby="signup-heading">
        <header class="auth-header">
          <p class="auth-brand">10X CRM</p>
          <h1 id="signup-heading">Create your account</h1>
          <p class="auth-subtitle">Create your CRM account to start managing your clients.</p>
        </header>

        <form id="signup-form" class="auth-form" novalidate>
          <div class="form-group">
            <label for="signup-full-name">Full Name</label>
            <input
              type="text"
              id="signup-full-name"
              name="fullName"
              placeholder="Enter your full name"
              autocomplete="name"
              aria-describedby="signup-full-name-error"
            >
            <p id="signup-full-name-error" class="field-error"></p>
          </div>

          <div class="form-group">
            <label for="signup-email">Email</label>
            <input
              type="email"
              id="signup-email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              aria-describedby="signup-email-error"
            >
            <p id="signup-email-error" class="field-error"></p>
          </div>

          <div class="form-group">
            <label for="signup-company">Company</label>
            <input
              type="text"
              id="signup-company"
              name="company"
              placeholder="Company (optional)"
              autocomplete="organization"
              aria-describedby="signup-company-error"
            >
            <p id="signup-company-error" class="field-error"></p>
          </div>

          <div class="form-group">
            <label for="signup-password">Password</label>
            <input
              type="password"
              id="signup-password"
              name="password"
              placeholder="Create a password"
              autocomplete="new-password"
              aria-describedby="signup-password-error"
            >
            <p id="signup-password-error" class="field-error"></p>
          </div>

          <div class="form-group">
            <label for="signup-confirm-password">Confirm Password</label>
            <input
              type="password"
              id="signup-confirm-password"
              name="confirmPassword"
              placeholder="Re-enter your password"
              autocomplete="new-password"
              aria-describedby="signup-confirm-password-error"
            >
            <p id="signup-confirm-password-error" class="field-error"></p>
          </div>

          <div
            id="signup-form-message"
            class="form-message"
            role="status"
            aria-live="polite"
          ></div>

          <button type="submit">Create Account</button>
        </form>

        <footer class="auth-footer">
          <p>Already have an account? <a href="index.html">Log in</a></p>
        </footer>
      </section>
    </div>
  </main>
</body>
</html>
